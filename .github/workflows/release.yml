name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/vatnar/sd:${{ github.ref_name }}

      - name: Configure CMake
        run: docker run --rm -v $(pwd):/src sd-build cmake -B build -G Ninja

      - name: Build
        run: docker run --rm -v $(pwd):/src sd-build cmake --build build --parallel

      - name: Run tests
        run: docker run --rm -v $(pwd):/src sd-build ctest --test-dir build --output-on-failure

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          artifacts: build/bin/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
