name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          push: false
          load: true
          tags: sd-build

      - name: Configure and build tests
        run: docker run --rm -v $(pwd):/src sd-build sh -c "rm -rf build && cmake -B build -G Ninja && cmake --build build --target SDGTest --parallel"

      - name: Run tests
        run: docker run --rm -v $(pwd):/src sd-build ctest --test-dir build/testing --output-on-failure
